<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glucose Predictor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      color: #ffffff;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus {
      border-color: #00d4ff;
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,212,255,0.3);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 24px;
      border-radius: 16px;
      padding: 24px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result.normal {
      background: linear-gradient(135deg, rgba(0,200,100,0.15), rgba(0,200,100,0.05));
      border: 1px solid rgba(0,200,100,0.3);
    }

    .result.prediabetic {
      background: linear-gradient(135deg, rgba(255,165,0,0.15), rgba(255,165,0,0.05));
      border: 1px solid rgba(255,165,0,0.3);
    }

    .result.diabetic {
      background: linear-gradient(135deg, rgba(255,60,60,0.15), rgba(255,60,60,0.05));
      border: 1px solid rgba(255,60,60,0.3);
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .result-icon { font-size: 32px; }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-value {
      font-size: 36px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }

    .result-unit {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .result-message {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-top: 12px;
    }

    .loading {
      display: none;
      text-align: center;
      color: rgba(255,255,255,0.5);
      margin-top: 20px;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      background: rgba(255,60,60,0.1);
      border: 1px solid rgba(255,60,60,0.3);
      border-radius: 10px;
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 28px 0;
    }

    .range-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .range-card {
      text-align: center;
      padding: 12px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .range-card .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin: 0 auto 8px;
    }

    .dot.green  { background: #00c864; }
    .dot.orange { background: #ffa500; }
    .dot.red    { background: #ff3c3c; }

    .range-card .range-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }

    .range-card .range-val {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .container { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🩺</div>
      <h1>Glucose Predictor</h1>
      <p>Enter patient details to predict plasma glucose concentration</p>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Pregnancies</label>
        <input type="number" id="Pregnancies" placeholder="e.g. 2" min="0"/>
      </div>
      <div class="form-group">
        <label>Blood Pressure (mm Hg)</label>
        <input type="number" id="BloodPressure" placeholder="e.g. 70" min="0"/>
      </div>
      <div class="form-group">
        <label>Skin Thickness (mm)</label>
        <input type="number" id="SkinThickness" placeholder="e.g. 30" min="0"/>
      </div>
      <div class="form-group">
        <label>Insulin (mu U/ml)</label>
        <input type="number" id="Insulin" placeholder="e.g. 120" min="0"/>
      </div>
      <div class="form-group">
        <label>BMI (kg/m²)</label>
        <input type="number" id="BMI" placeholder="e.g. 33.5" step="0.1" min="0"/>
      </div>
      <div class="form-group">
        <label>Diabetes Pedigree</label>
        <input type="number" id="DiabetesPedigree" placeholder="e.g. 0.5" step="0.01" min="0"/>
      </div>
      <div class="form-group" style="grid-column: span 2;">
        <label>Age (years)</label>
        <input type="number" id="Age" placeholder="e.g. 28" min="0"/>
      </div>
    </div>

    <button class="btn" onclick="predict()">Predict Glucose Level</button>

    <div class="loading" id="loading">
      <span class="spinner"></span> Analyzing patient data...
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-header">
        <div class="result-icon" id="resultIcon"></div>
        <div>
          <div class="result-title">Predicted Glucose</div>
          <div class="result-value" id="resultValue"></div>
          <div class="result-unit">mg/dL</div>
        </div>
      </div>
      <div class="result-message" id="resultMessage"></div>
    </div>

    <hr class="divider"/>

    <div class="range-info">
      <div class="range-card">
        <div class="dot green"></div>
        <div class="range-label">Normal</div>
        <div class="range-val">Below 100</div>
      </div>
      <div class="range-card">
        <div class="dot orange"></div>
        <div class="range-label">Pre-diabetic</div>
        <div class="range-val">100 – 125</div>
      </div>
      <div class="range-card">
        <div class="dot red"></div>
        <div class="range-label">Diabetic</div>
        <div class="range-val">126 & above</div>
      </div>
    </div>
  </div>

  <script>
    async function predict() {
      const fields = ['Pregnancies','BloodPressure','SkinThickness','Insulin','BMI','DiabetesPedigree','Age'];
      const data = {};

      for (const f of fields) {
        const val = document.getElementById(f).value;
        if (val === '' || val === null) {
          showError('Please fill in all fields.');
          return;
        }
        data[f] = parseFloat(val);
      }

      const btn = document.querySelector('.btn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const result = document.getElementById('result');

      btn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';
      result.style.display = 'none';

      try {
        const response = await fetch('https://glucose-predictor-api-3.onrender.com/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!response.ok) throw new Error('Server error. Please try again.');

        const res = await response.json();
        const glucose = res.predicted_glucose_mg_dL;
        const message = res.message;

        document.getElementById('resultValue').textContent = glucose;
        document.getElementById('resultMessage').textContent = message;

        result.className = 'result';
        if (glucose < 100) {
          result.classList.add('normal');
          document.getElementById('resultIcon').textContent = '✅';
        } else if (glucose < 126) {
          result.classList.add('prediabetic');
          document.getElementById('resultIcon').textContent = '⚠️';
        } else {
          result.classList.add('diabetic');
          document.getElementById('resultIcon').textContent = '🔴';
        }

        result.style.display = 'block';

      } catch (err) {
        showError(err.message || 'Something went wrong. Check your API URL.');
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    function showError(msg) {
      const error = document.getElementById('error');
      error.textContent = msg;
      error.style.display = 'block';
    }
  </script>
</body>
</html>
